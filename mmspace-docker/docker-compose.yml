services:
  mongodb:
    image: mongo:7.0
    container_name: mmspace-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: mmspace
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27018:27017"
    networks:
      - mmspace-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "admin", "--password", "password123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  ml-service:
    build:
      context: ../ml_service
      dockerfile: ../mmspace-docker/docker/ml_service/Dockerfile
    container_name: mmspace-ml-service
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      TF_CPP_MIN_LOG_LEVEL: "2"
    networks:
      - mmspace-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: ../mmspace-docker/docker/server/Dockerfile
    container_name: mmspace-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/mmspace?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      ML_SERVICE_URL: http://ml-service:8000
    command: sh -c "npm run seed:if-empty && npm start"
    volumes:
      - server_uploads:/usr/src/app/uploads
    ports:
      - "5001:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - mmspace-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ../client
      dockerfile: ../mmspace-docker/docker/client/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: http://localhost:3000
    container_name: mmspace-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - mmspace-network

volumes:
  mongodb_data:
    driver: local
  server_uploads:
    driver: local

networks:
  mmspace-network:
    driver: bridge
